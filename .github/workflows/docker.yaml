name: docker

on:
  workflow_call:
    inputs:
      version:
        description: 'Version tag to build (e.g. 5.15.24.18)'
        required: true
        type: string
      latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: false
      lib_url:
        description: 'URL to lib.tar.gz release asset containing proprietary JARs'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: damoun/omada-controller

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.version && format('refs/tags/v{0}', inputs.version) || '' }}
          persist-credentials: false

      - name: Log in to the Container registry
        uses: docker/login-action@40891eba8c2bcd1309b07ba8b11232f313e86779
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c4ee3adeed93b1fa6a762f209fb01608c1a22f1e
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.latest == true }}

      - name: Build and push Docker image
        uses: docker/build-push-action@eafaea8d0f5853934deece2ffa67af59d936562b
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LIB_URL=${{ inputs.lib_url }}
