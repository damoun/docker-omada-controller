name: release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL for Omada tar.gz (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check latest version
        id: check
        if: ${{ inputs.download_url == '' }}
        run: bash scripts/check-latest-version.sh

      - name: Use provided download URL
        id: provided
        if: ${{ inputs.download_url != '' }}
        run: |
          url="${{ inputs.download_url }}"
          version=$(echo "$url" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1 | tr -d 'v')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "download_url=$url" >> "$GITHUB_OUTPUT"
          echo "release_notes_url=" >> "$GITHUB_OUTPUT"

      - name: Resolve version and URL
        id: resolved
        run: |
          if [[ -n "${{ inputs.download_url }}" ]]; then
            echo "version=${{ steps.provided.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "download_url=${{ steps.provided.outputs.download_url }}" >> "$GITHUB_OUTPUT"
            echo "release_notes_url=" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.check.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "download_url=${{ steps.check.outputs.download_url }}" >> "$GITHUB_OUTPUT"
            echo "release_notes_url=${{ steps.check.outputs.release_notes_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already released
        id: version_check
        run: |
          current_version=$(sed -n '9p' pom.xml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
          new_version="${{ steps.resolved.outputs.version }}"
          echo "current_version=$current_version"
          echo "new_version=$new_version"
          if [[ "$current_version" == "$new_version" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Omada tarball
        if: steps.version_check.outputs.skip == 'false'
        run: |
          curl -fsSL -o omada.tar.gz "${{ steps.resolved.outputs.download_url }}"

      - name: Extract JARs
        if: steps.version_check.outputs.skip == 'false'
        run: |
          bash scripts/extract-omada.sh omada.tar.gz extracted-jars

      - name: Replace lib/ JARs
        if: steps.version_check.outputs.skip == 'false'
        run: |
          rm -f lib/*.jar
          cp extracted-jars/*.jar lib/

      - name: Update version in pom.xml
        if: steps.version_check.outputs.skip == 'false'
        run: |
          new_version="${{ steps.resolved.outputs.version }}"
          sed -i "9s|<version>.*</version>|<version>${new_version}</version>|" pom.xml

      - name: Commit and tag
        if: steps.version_check.outputs.skip == 'false'
        run: |
          new_version="${{ steps.resolved.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/ pom.xml
          git commit -m "chore: upgrade omada-controller to ${new_version}"
          git tag "v${new_version}"
          git push origin main
          git push origin "v${new_version}"

      - name: Download release notes PDF
        if: steps.version_check.outputs.skip == 'false' && steps.resolved.outputs.release_notes_url != ''
        run: |
          curl -fsSL -o release-notes.pdf "${{ steps.resolved.outputs.release_notes_url }}"

      - name: Extract release notes text
        if: steps.version_check.outputs.skip == 'false'
        id: notes
        run: |
          release_body=""
          if [[ -f release-notes.pdf ]]; then
            sudo apt-get install -qq -y poppler-utils
            release_body=$(pdftotext release-notes.pdf - 2>/dev/null | head -200 || true)
          fi
          if [[ -z "$release_body" ]]; then
            release_body="Omada Controller ${{ steps.resolved.outputs.version }} release."
          fi
          # Write to file to avoid quoting issues
          echo "$release_body" > release_body.txt

      - name: Create GitHub release
        if: steps.version_check.outputs.skip == 'false'
        run: |
          new_version="${{ steps.resolved.outputs.version }}"
          args=(
            "v${new_version}"
            --title "v${new_version}"
            --notes-file release_body.txt
          )
          if [[ -f release-notes.pdf ]]; then
            args+=(release-notes.pdf)
          fi
          gh release create "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
