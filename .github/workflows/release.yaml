name: release

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL for Omada tar.gz (optional)'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.check.outputs.version }}
      skip: ${{ steps.version_check.outputs.skip }}
      is_latest: ${{ steps.is_latest.outputs.value }}
      lib_url: ${{ steps.lib_asset.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check latest version
        id: check
        env:
          INPUT_DOWNLOAD_URL: ${{ inputs.download_url }}
        run: bash scripts/check-latest-version.sh "$INPUT_DOWNLOAD_URL"

      - name: Check if version already released
        id: version_check
        env:
          NEW_VERSION: ${{ steps.check.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${NEW_VERSION}" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if this is the latest version
        id: is_latest
        env:
          NEW_VERSION: ${{ steps.check.outputs.version }}
        run: |
          latest_version=$(curl -fsSL https://support.omadanetworks.com/us/download/software/omada-controller/ \
            | grep -oE 'href="https://static\.tp-link\.com/upload/software/[^"]+_linux_x64_[^"]+\.tar\.gz"' \
            | head -1 | grep -oE 'v[0-9]+(\.[0-9]+)+' | head -1 | tr -d v || true)
          if [[ "$NEW_VERSION" == "$latest_version" ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Omada tarball
        if: steps.version_check.outputs.skip == 'false'
        env:
          DOWNLOAD_URL: ${{ steps.check.outputs.download_url }}
        run: curl -fsSL -o omada.tar.gz "$DOWNLOAD_URL"

      - name: Extract JARs, properties, and data
        if: steps.version_check.outputs.skip == 'false'
        run: |
          work_dir=$(mktemp -d)
          tar -xzf omada.tar.gz -C "$work_dir"
          root_dir=$(find "$work_dir" -mindepth 1 -maxdepth 1 -type d | head -1)

          # Package all JARs from the release into lib.tar.gz
          tar -czf lib.tar.gz -C "$root_dir/lib" .

          # Sync properties/ and data/ into the repo
          for dir in properties data; do
            if [[ -d "$root_dir/$dir" ]]; then
              rsync -a --delete "$root_dir/$dir/" "$dir/"
            fi
          done

          rm -rf "$work_dir"

      - name: Commit and tag
        if: steps.version_check.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.check.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git add properties/ data/
          git diff --cached --quiet && echo "Nothing to commit, skipping" || git commit -m "chore: upgrade omada-controller to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}" 2>/dev/null || echo "Tag v${NEW_VERSION} already exists, skipping"
          git push origin main
          git push origin "v${NEW_VERSION}" || echo "Tag v${NEW_VERSION} already pushed, skipping"

      - name: Download release notes PDF
        if: steps.version_check.outputs.skip == 'false' && steps.check.outputs.release_notes_url != ''
        env:
          RELEASE_NOTES_URL: ${{ steps.check.outputs.release_notes_url }}
        run: curl -fsSL -o release-notes.pdf "$RELEASE_NOTES_URL"

      - name: Extract release notes text
        if: steps.version_check.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.check.outputs.version }}
        run: |
          release_body=""
          if [[ -f release-notes.pdf ]]; then
            sudo apt-get install -qq -y poppler-utils
            release_body=$(pdftotext release-notes.pdf - 2>/dev/null | python3 scripts/format-release-notes.py || true)
          fi
          if [[ -z "$release_body" ]]; then
            release_body="Omada Controller ${NEW_VERSION} release."
          fi
          echo "$release_body" > release_body.txt

      - name: Create GitHub release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.check.outputs.version }}
        run: |
          if gh release view "v${NEW_VERSION}" &>/dev/null; then
            gh release upload "v${NEW_VERSION}" lib.tar.gz --clobber
          else
            args=(
              "v${NEW_VERSION}"
              --title "v${NEW_VERSION}"
              --notes-file release_body.txt
              lib.tar.gz
            )
            if [[ -f release-notes.pdf ]]; then
              args+=(release-notes.pdf)
            fi
            gh release create "${args[@]}"
          fi

      - name: Get lib asset URL
        if: steps.version_check.outputs.skip == 'false'
        id: lib_asset
        env:
          NEW_VERSION: ${{ steps.check.outputs.version }}
        run: |
          echo "url=https://github.com/${{ github.repository }}/releases/download/v${NEW_VERSION}/lib.tar.gz" >> "$GITHUB_OUTPUT"

  docker:
    needs: release
    if: needs.release.outputs.skip == 'false'
    uses: ./.github/workflows/docker.yaml
    with:
      version: ${{ needs.release.outputs.version }}
      latest: ${{ needs.release.outputs.is_latest == 'true' }}
      lib_url: ${{ needs.release.outputs.lib_url }}
    permissions:
      contents: read
      packages: write
