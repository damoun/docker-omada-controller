services:
  omada:
    build: .
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/omada
      - OMADA_PORT_DISCOVERY=30001
    ports:
      - 8088:8088
      - 8043:8043
      - 8843:8843
      - 30001:30001/udp
  mongo:
    image: mongo:6.0.8@sha256:b7e6bf5f9be1c48ee85c1b9431165e2f73f78535e86022b81732acc2c6ffe5b6
    ports:
      - '27017:27017'
